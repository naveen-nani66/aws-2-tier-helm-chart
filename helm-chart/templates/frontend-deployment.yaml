apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.frontend.deploymentname }}
  labels:
    app: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # ADD THIS SECTION BELOW
      imagePullSecrets:
        - name: ecr-registry-helper
      containers:
        - name: frontend
          image: {{ .Values.frontend.image }}
          imagePullPolicy: Always  # Recommended when using :latest or frequent builds
          ports:
            - containerPort: 3000
          env:
            - name: REACT_APP_API_URL
              value: "http://backend.railway-app.svc.cluster.local:5000"
